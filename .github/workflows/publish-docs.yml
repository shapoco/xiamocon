name: Publish Docs

on:
  push:
    branches:
      - main
    paths:
      - docsrc/**
      - requirements.txt
      - .github/workflows/publish-docs.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-docs
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Sphinx HTML
        run: |
          sphinx-build -b html docsrc docsrc/_build/html

      - name: Update gh-pages/docs/ref
        run: |
          set -euo pipefail

          git fetch origin gh-pages:gh-pages

          worktree_dir="$(mktemp -d)"
          trap 'git worktree remove --force "$worktree_dir" || true' EXIT

          git worktree add "$worktree_dir" gh-pages
          mkdir -p "$worktree_dir/docs/ref"

          rsync -a --delete docsrc/_build/html/ "$worktree_dir/docs/ref/"

          cd "$worktree_dir"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/ref

          if git diff --cached --quiet; then
            echo "No changes in docs/ref/"
            exit 0
          fi

          git commit -m "docs: update ref from ${GITHUB_SHA}"
          git push origin HEAD:gh-pages
